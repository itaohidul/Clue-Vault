<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClueVault — Unlock, Solve, Earn</title>
    <link rel="icon" type="image/png" href="/src/assets/images/cluevault_logo_1779272321887.png" />
    <!-- 1. Load Telegram WebApp base first -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 2. Set up early CloudStorage polyfills to prevent older WebView/App crashes -->
    <script>
      (function() {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (!tg) {
            window.Telegram = window.Telegram || {};
            window.Telegram.WebApp = window.Telegram.WebApp || {};
            tg = window.Telegram.WebApp;
          }
          if (tg && !tg.CloudStorage) {
            var mockCloudStorage = {
              setItem: function(key, value, callback) {
                localStorage.setItem('tg_cloud_' + key, value);
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              getItem: function(key, callback) {
                var val = localStorage.getItem('tg_cloud_' + key);
                if (callback) callback(null, val);
                return Promise.resolve(val);
              },
              getItems: function(keys, callback) {
                var res = {};
                keys.forEach(function(k) {
                  res[k] = localStorage.getItem('tg_cloud_' + k);
                });
                if (callback) callback(null, res);
                return Promise.resolve(res);
              },
              removeItem: function(key, callback) {
                localStorage.removeItem('tg_cloud_' + key);
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              removeItems: function(keys, callback) {
                keys.forEach(function(k) { localStorage.removeItem('tg_cloud_' + k); });
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              getKeys: function(callback) {
                var keys = Object.keys(localStorage)
                  .filter(function(k) { return k.indexOf('tg_cloud_') === 0; })
                  .map(function(k) { return k.replace('tg_cloud_', ''); });
                if (callback) callback(null, keys);
                return Promise.resolve(keys);
              }
            };
            Object.defineProperty(tg, 'CloudStorage', {
              get: function() { return mockCloudStorage; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Early TG storage polyfill failed:", e);
        }
      })();
    </script>
    <!-- 3. Third-party Ad SDK runs after Telegram and its CloudStorage is ready -->
    <script src='//libtl.com/sdk.js' data-zone='11030019' data-sdk='show_11030019' async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
