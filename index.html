<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClueVault — Unlock, Solve, Earn</title>
    <link rel="icon" type="image/png" href="/src/assets/images/cluevault_logo_1779272321887.png" />
    <!-- 1. Load Telegram WebApp base first -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 2. Set up early CloudStorage polyfills & error suppressions to prevent older WebView/App crashes -->
    <script>
      (function() {
        // A. Global Error & Promise Rejection Suppression for Third-Party Ads (adex timeout / Empty feed)
        window.addEventListener('error', function(e) {
          var msg = (e.message || '').toString();
          if (msg.indexOf('adex timeout') !== -1 || msg.indexOf('Empty feed') !== -1 || msg.indexOf('CloudStorage') !== -1) {
            if (e.preventDefault) e.preventDefault();
            if (e.stopPropagation) e.stopPropagation();
            return true;
          }
        }, true);
        
        window.addEventListener('unhandledrejection', function(e) {
          var msg = (e.reason && e.reason.message || '').toString();
          if (msg.indexOf('adex timeout') !== -1 || msg.indexOf('Empty feed') !== -1 || msg.indexOf('CloudStorage') !== -1) {
            if (e.preventDefault) e.preventDefault();
            if (e.stopPropagation) e.stopPropagation();
            return true;
          }
        }, true);

        // B. Console.error Filter to swallow known benign sandbox/ad script errors
        var originalConsoleError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var concatenatedMessage = args.map(function(arg) {
            if (typeof arg === 'string') return arg;
            try { return JSON.stringify(arg); } catch(ex) { return ''; }
          }).join(' ');

          if (
            concatenatedMessage.indexOf('adex timeout') !== -1 || 
            concatenatedMessage.indexOf('Empty feed') !== -1 || 
            concatenatedMessage.indexOf('EventBuilder: Config or transport') !== -1 ||
            concatenatedMessage.indexOf('CloudStorage') !== -1
          ) {
            // Demote to custom warn debug line to avoid alerting developers or telemetry
            console.warn('[Benign Intercepted Warning]:', concatenatedMessage);
            return;
          }
          originalConsoleError.apply(console, arguments);
        };

        // C. Clean Proxy-based CloudStorage Polyfill for Telegram.WebApp
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          
          var needsPolyfill = false;
          if (tg) {
            try {
              var currentVer = tg.version || '6.0';
              var vParts = currentVer.split('.');
              var major = parseInt(vParts[0], 10);
              var minor = parseInt(vParts[1] || '0', 10);
              
              if (major < 6 || (major === 6 && minor < 9)) {
                needsPolyfill = true;
              }
            } catch(e) {
              needsPolyfill = true;
            }
          }

          if (needsPolyfill && tg) {
            var mockCloudStorage = {
              setItem: function(key, value, callback) {
                localStorage.setItem('tg_cloud_' + key, value);
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              getItem: function(key, callback) {
                var val = localStorage.getItem('tg_cloud_' + key);
                if (callback) callback(null, val);
                return Promise.resolve(val);
              },
              getItems: function(keys, callback) {
                var res = {};
                keys.forEach(function(k) {
                  res[k] = localStorage.getItem('tg_cloud_' + k);
                });
                if (callback) callback(null, res);
                return Promise.resolve(res);
              },
              removeItem: function(key, callback) {
                localStorage.removeItem('tg_cloud_' + key);
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              removeItems: function(keys, callback) {
                keys.forEach(function(k) { localStorage.removeItem('tg_cloud_' + k); });
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              getKeys: function(callback) {
                var keys = Object.keys(localStorage)
                  .filter(function(k) { return k.indexOf('tg_cloud_') === 0; })
                  .map(function(k) { return k.replace('tg_cloud_', ''); });
                if (callback) callback(null, keys);
                return Promise.resolve(keys);
              }
            };
            
            // Define clean Proxy to intercept the CloudStorage property accesses transparently
            if (typeof window.Proxy === 'function') {
              var webAppProxy = new Proxy(tg, {
                get: function(target, prop, receiver) {
                  if (prop === 'CloudStorage') {
                    return mockCloudStorage;
                  }
                  var val = Reflect.get(target, prop, receiver);
                  if (typeof val === 'function') {
                    return val.bind(target);
                  }
                  return val;
                }
              });
              window.Telegram.WebApp = webAppProxy;
            } else {
              try {
                Object.defineProperty(tg, 'CloudStorage', {
                  value: mockCloudStorage,
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
              } catch (e) {
                try {
                  tg.CloudStorage = mockCloudStorage;
                } catch (e2) {}
              }
            }
          }
        } catch (e) {}
      })();
    </script>
    <!-- 3. Third-party Ad SDK (libtl.com) -->
    <script src="//libtl.com/sdk.js" data-zone="11030019" data-sdk="show_11030019"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
