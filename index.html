<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClueVault — Unlock, Solve, Earn</title>
    <link rel="icon" type="image/png" href="/src/assets/images/cluevault_logo_1779272321887.png" />
    <!-- 1. Load Telegram WebApp base first -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- 2. Set up early CloudStorage polyfills to prevent older WebView/App crashes -->
    <script>
      (function() {
        try {
          var tg = window.Telegram && window.Telegram.WebApp;
          if (!tg) {
            window.Telegram = window.Telegram || {};
            window.Telegram.WebApp = window.Telegram.WebApp || {};
            tg = window.Telegram.WebApp;
          }
          
          // Check if CloudStorage is supported or already defined
          var needsPolyfill = false;
          try {
            if (!tg.CloudStorage) needsPolyfill = true;
          } catch(e) {
            needsPolyfill = true;
          }

          // Spoof version to prevent "CloudStorage is not supported in version 6.0" console errors
          if (!tg.version || parseFloat(tg.version) < 6.9) {
            tg.version = "6.9";
          }
          
          if (!tg.isVersionAtLeast) {
            tg.isVersionAtLeast = function(v) {
              return true; // Simple pass for all version checks
            };
          }

          if (needsPolyfill) {
            var mockCloudStorage = {
              setItem: function(key, value, callback) {
                localStorage.setItem('tg_cloud_' + key, value);
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              getItem: function(key, callback) {
                var val = localStorage.getItem('tg_cloud_' + key);
                if (callback) callback(null, val);
                return Promise.resolve(val);
              },
              getItems: function(keys, callback) {
                var res = {};
                keys.forEach(function(k) {
                  res[k] = localStorage.getItem('tg_cloud_' + k);
                });
                if (callback) callback(null, res);
                return Promise.resolve(res);
              },
              removeItem: function(key, callback) {
                localStorage.removeItem('tg_cloud_' + key);
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              removeItems: function(keys, callback) {
                keys.forEach(function(k) { localStorage.removeItem('tg_cloud_' + k); });
                if (callback) callback(null, true);
                return Promise.resolve(true);
              },
              getKeys: function(callback) {
                var keys = Object.keys(localStorage)
                  .filter(function(k) { return k.indexOf('tg_cloud_') === 0; })
                  .map(function(k) { return k.replace('tg_cloud_', ''); });
                if (callback) callback(null, keys);
                return Promise.resolve(keys);
              }
            };
            
            try {
              Object.defineProperty(tg, 'CloudStorage', {
                get: function() { return mockCloudStorage; },
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              // Fallback for non-configurable properties
              tg.CloudStorage = mockCloudStorage;
            }
          }
        } catch (e) {
          // Silent fail for polyfill
        }
      })();
    </script>
    <!-- 3. Third-party Ad SDK runs after Telegram and its CloudStorage is ready -->
    <script>
      // Ad SDK with a basic timeout protection and redirect mitigation
      (function() {
        var script = document.createElement('script');
        script.src = 'https://libtl.com/sdk.js';
        script.setAttribute('data-zone', '11030019');
        script.setAttribute('data-sdk', 'show_11030019');
        script.async = true;
        script.defer = true;
        
        script.onerror = function() {
          console.warn("Ad SDK failed to load (possibly ad-block or timeout)");
        };
        
        // Safety timeout for 'adex timeout' issue
        var adTimeout = setTimeout(function() {
          if (!window.show_11030019) {
             console.warn("Ad SDK load timed out (adex timeout) - disabling ad functionality");
             window.show_11030019 = function() { console.log("Ad SDK dummy called (timed out)"); };
          }
        }, 8000);
        
        script.onload = function() { 
          clearTimeout(adTimeout);
          // Mitigation for accidental full-page redirects: 
          // Some ad SDKs might try to use window.location.assign if they fail to open popups.
          // We can't fully block it without breaking everything, but we can wrap the ad calls.
        };
        
        document.head.appendChild(script);

        // Helper to prioritize direct links which are usually safer (opens in new tab)
        window.openDirectLink = function() {
          var directLinks = [
            'https://glauvoup.net/4/6926315'
          ];
          var link = directLinks[Math.floor(Math.random() * directLinks.length)];
          try {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg && typeof tg.openLink === "function") {
              tg.openLink(link);
            } else {
              var win = window.open(link, '_blank');
              if (!win) {
                console.warn("Popup blocked by browser mechanism.");
              }
            }
          } catch(e) {
            console.warn("Direct link popup blocked:", e);
          }
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
